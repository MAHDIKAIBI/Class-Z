name: Hybrid Cloud Video Pipeline

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: 'Action Type'
        required: true
        default: 'RENDER_ONLY'
        type: choice
        options:
          - CREATE_FRESH
          - CREATE_AUTOMATIC
          - RESUME
          - RENDER_ONLY
      channel_name:
        description: 'Channel to operate on'
        required: true
        default: 'ClassZ'
        type: choice
        options:
          - ClassZ
          - Midi-Fi
      topic:
        description: 'Topic Name'
        required: false
        type: string

jobs:
  ollama_server:
    if: inputs.action_type != 'RENDER_ONLY'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install rclone jq curl wget -y

      - name: Configure rclone Silently
        env:
          ENGINE_TOKEN_RAW: ${{ secrets.G_DRIVE_TOKEN }}
          DATA_TOKEN_RAW: ${{ inputs.channel_name == 'Midi-Fi' && secrets.G_DRIVE_TOKEN_MIDIFI || secrets.G_DRIVE_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p ~/.config/rclone
          
          # Engine Token
          E_ACCESS=$(echo $ENGINE_TOKEN_RAW | jq -r '.token')
          E_REFRESH=$(echo $ENGINE_TOKEN_RAW | jq -r '.refresh_token')
          E_EXPIRY=$(echo $ENGINE_TOKEN_RAW | jq -r '.expiry')
          ENGINE_TOKEN="{\"access_token\":\"$E_ACCESS\",\"token_type\":\"Bearer\",\"refresh_token\":\"$E_REFRESH\",\"expiry\":\"$E_EXPIRY\"}"
          
          # Data Token
          D_ACCESS=$(echo $DATA_TOKEN_RAW | jq -r '.token')
          D_REFRESH=$(echo $DATA_TOKEN_RAW | jq -r '.refresh_token')
          D_EXPIRY=$(echo $DATA_TOKEN_RAW | jq -r '.expiry')
          DATA_TOKEN="{\"access_token\":\"$D_ACCESS\",\"token_type\":\"Bearer\",\"refresh_token\":\"$D_REFRESH\",\"expiry\":\"$D_EXPIRY\"}"
          
          cat << EOF > ~/.config/rclone/rclone.conf
          [engine]
          type = drive
          client_id = $CLIENT_ID
          client_secret = $CLIENT_SECRET
          scope = drive
          token = $ENGINE_TOKEN
          
          [data]
          type = drive
          client_id = $CLIENT_ID
          client_secret = $CLIENT_SECRET
          scope = drive
          token = $DATA_TOKEN
          EOF

      - name: Check Checkpoints (Universal Smart Exclusion)
        id: checkpoint
        run: |
          echo "READY_TO_RENDER=false" >> $GITHUB_ENV
          
          TOPIC="${{ inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            if rclone cat "data:Colab_AutoVideoCreator/channels/${{ inputs.channel_name }}/to upload/$TOPIC/master_timeline.json" > timeline.json 2>/dev/null; then
               MISSING_VIDEOS=$(jq '[.timeline[] | select(.media_path == null and .media_paths == null)] | length' timeline.json)
               MISSING_OVERLAYS=$(jq '[.timeline[] | select(.overlay_image_query != null and (.overlay_image_query | ascii_downcase) != "none" and .overlay_image == null)] | length' timeline.json)
               if [ "$MISSING_VIDEOS" -eq 0 ] && [ "$MISSING_OVERLAYS" -eq 0 ]; then
                   echo "READY_TO_RENDER=true" >> $GITHUB_ENV
                   echo "[+] All assets present. Skipping Ollama server (RENDER_ONLY mode)."
               fi
            fi
          else
            echo "[*] No topic provided (RESUME/CREATE action). Ollama server will start normally."
          fi

      - name: Setup Local Ollama
        if: env.READY_TO_RENDER != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          sudo systemctl stop ollama || true
          OLLAMA_HOST="0.0.0.0" OLLAMA_ORIGINS="*" ollama serve > ollama.log 2>&1 &
          sleep 5
          ollama pull qwen2.5:7b
          ollama pull llava
          
          # Pre-warm models into memory so brain_job gets instant responses (no 503 cold-load)
          echo "Warming up qwen2.5:7b..."
          curl -s -X POST http://localhost:11434/api/generate -d '{"model":"qwen2.5:7b","prompt":"hi","stream":false}' > /dev/null
          echo "Warming up llava..."
          curl -s -X POST http://localhost:11434/api/generate -d '{"model":"llava","prompt":"hi","stream":false}' > /dev/null
          echo "[+] Models pre-loaded and ready."
          
          # Download and run Bore Tunnel (raw TCP, no bot protection, no intercepts)
          curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx
          sudo mv bore /usr/local/bin/
          
          bore local 11434 --to bore.pub > tunnel.log 2>&1 &
          sleep 5
          BORE_PORT=$(grep -oP 'bore\.pub:\K\d+' tunnel.log | head -n 1)
          OLLAMA_URL="http://bore.pub:$BORE_PORT"
          
          if [ -z "$BORE_PORT" ]; then
             echo "Failed to establish tunnel!"
             cat tunnel.log
             exit 1
          fi
          
          echo "Ollama API is live at: $OLLAMA_URL"
          echo "$OLLAMA_URL" > ollama_url.txt
          rclone copyto ollama_url.txt "data:Colab_AutoVideoCreator/ollama_url_${{ github.run_id }}.txt"

      - name: Keep Alive (Wait for shutdown)
        if: env.READY_TO_RENDER != 'true'
        run: |
          OLLAMA_URL=$(cat ollama_url.txt)
          PING_COUNTER=0
          while true; do
            if rclone lsf "data:Colab_AutoVideoCreator/ollama_shutdown_${{ github.run_id }}.txt" >/dev/null 2>&1; then
              echo "Shutdown signal received! Terminating server."
              rclone delete "data:Colab_AutoVideoCreator/ollama_url_${{ github.run_id }}.txt" || true
              rclone delete "data:Colab_AutoVideoCreator/ollama_shutdown_${{ github.run_id }}.txt" || true
              break
            fi
            # Ping Ollama through the tunnel every 60s to keep localhost.run HTTP routing alive
            # SSH keepalive alone is not enough — localhost.run also drops the HTTP route on inactivity
            PING_COUNTER=$((PING_COUNTER + 1))
            if [ $((PING_COUNTER % 4)) -eq 0 ]; then
              curl -sf -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" --max-time 10 "$OLLAMA_URL/api/tags" > /dev/null 2>&1 && echo "[keep-warm] Tunnel ping OK" || echo "[keep-warm] Tunnel ping failed — will retry"
            fi
            sleep 15
          done

  creation_job:
    if: inputs.action_type != 'RENDER_ONLY'
    runs-on: ubuntu-latest
    outputs:
      vault_name: ${{ steps.orchestrator.outputs.vault_name }}
      total_frames: ${{ steps.orchestrator.outputs.total_frames }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-brain-${{ runner.os }}-firefox
          restore-keys: apt-brain-${{ runner.os }}-

      - name: Install System Dependencies
        run: |
          sudo snap remove firefox || true
          sudo add-apt-repository ppa:mozillateam/ppa -y
          echo -e 'Package: *\nPin: release o=LP-PPA-mozillateam\nPin-Priority: 1001' | sudo tee /etc/apt/preferences.d/mozilla-firefox
          sudo apt-get update
          sudo apt-get install rclone jq ffmpeg firefox xvfb xclip sox libsox-fmt-all zstd pciutils lshw rubberband-cli -y



      - name: Configure rclone Silently
        env:
          ENGINE_TOKEN_RAW: ${{ secrets.G_DRIVE_TOKEN }}
          DATA_TOKEN_RAW: ${{ inputs.channel_name == 'Midi-Fi' && secrets.G_DRIVE_TOKEN_MIDIFI || secrets.G_DRIVE_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p ~/.config/rclone
          
          # Engine Token
          E_ACCESS=$(echo $ENGINE_TOKEN_RAW | jq -r '.token')
          E_REFRESH=$(echo $ENGINE_TOKEN_RAW | jq -r '.refresh_token')
          E_EXPIRY=$(echo $ENGINE_TOKEN_RAW | jq -r '.expiry')
          ENGINE_TOKEN="{\"access_token\":\"$E_ACCESS\",\"token_type\":\"Bearer\",\"refresh_token\":\"$E_REFRESH\",\"expiry\":\"$E_EXPIRY\"}"
          
          # Data Token
          D_ACCESS=$(echo $DATA_TOKEN_RAW | jq -r '.token')
          D_REFRESH=$(echo $DATA_TOKEN_RAW | jq -r '.refresh_token')
          D_EXPIRY=$(echo $DATA_TOKEN_RAW | jq -r '.expiry')
          DATA_TOKEN="{\"access_token\":\"$D_ACCESS\",\"token_type\":\"Bearer\",\"refresh_token\":\"$D_REFRESH\",\"expiry\":\"$D_EXPIRY\"}"
          
          cat << EOF > ~/.config/rclone/rclone.conf
          [engine]
          type = drive
          client_id = $CLIENT_ID
          client_secret = $CLIENT_SECRET
          scope = drive
          token = $ENGINE_TOKEN
          
          [data]
          type = drive
          client_id = $CLIENT_ID
          client_secret = $CLIENT_SECRET
          scope = drive
          token = $DATA_TOKEN
          EOF

      - name: Check Checkpoints (Universal Smart Exclusion)
        id: checkpoint
        run: |
          echo "SKIP_PROFILE=false" >> $GITHUB_ENV
          echo "READY_TO_RENDER=false" >> $GITHUB_ENV
          
          echo "Probing Google Drive for checkpoints..."
          VAULT="${{ inputs.topic }}"
          CHANNEL="${{ inputs.channel_name }}"
          TIMELINE_JSON=""
          
          # Check public/channels workspace first (modern RESUME path)
          if rclone copy "data:Colab_AutoVideoCreator/public/channels/$CHANNEL/$VAULT/master_timeline.json" . --transfers 4 2>/dev/null && [ -s master_timeline.json ]; then
            echo "Found master_timeline.json in public/channels workspace."
            TIMELINE_JSON="master_timeline.json"
          # Fall back to legacy to upload path
          elif rclone cat "data:Colab_AutoVideoCreator/channels/$CHANNEL/to upload/$VAULT/master_timeline.json" > master_timeline.json 2>/dev/null && [ -s master_timeline.json ]; then
            echo "Found master_timeline.json in to upload workspace."
            TIMELINE_JSON="master_timeline.json"
          fi
          
          if [ -n "$TIMELINE_JSON" ]; then
             echo "Analyzing completion status..."
             
             # Count scenes without downloaded_video
             MISSING_VIDEOS=$(jq '[.timeline[] | select(.media_path == null and .media_paths == null)] | length' "$TIMELINE_JSON")
             
             # Count scenes that requested an overlay but haven't downloaded it
             MISSING_OVERLAYS=$(jq '[.timeline[] | select(.overlay_image_query != null and (.overlay_image_query | ascii_downcase) != "none" and .overlay_image == null)] | length' "$TIMELINE_JSON")
             
             echo "Missing Videos: $MISSING_VIDEOS"
             echo "Missing Overlays: $MISSING_OVERLAYS"
             
             if [ "$MISSING_VIDEOS" -eq 0 ] && [ "$MISSING_OVERLAYS" -eq 0 ]; then
                 echo "100% READY TO RENDER! Bypassing Ollama and Playwright entirely."
                 echo "READY_TO_RENDER=true" >> $GITHUB_ENV
                 echo "SKIP_PROFILE=true" >> $GITHUB_ENV
             fi
          fi
          
          # If not completely ready, check if we can at least skip Playwright
          if [ "$READY_TO_RENDER" != "true" ]; then
             if rclone lsf "data:Colab_AutoVideoCreator/public/channels/${{ inputs.channel_name }}/${{ inputs.topic }}/script.txt" >/dev/null 2>&1; then
                 echo "Detected script.txt. ChatGPT phase is done. Bypassing Playwright profile."
                 echo "SKIP_PROFILE=true" >> $GITHUB_ENV
             fi
          fi


      - name: Run Python Orchestrator
        id: orchestrator
        env:
          ACTION_TYPE: ${{ inputs.action_type }}
          CHANNEL_NAME: ${{ inputs.channel_name }}
          TOPIC: ${{ inputs.topic }}
          CLOUD_TTS_PARALLEL: "1"
        run: |
          python -m pip install requests
          xvfb-run -a python -u .github/scripts/orchestrator.py
          
      # NOTE: Shutdown signal is intentionally sent in brain_job AFTER The_Brain.py
      # finishes, because The_Brain.py needs Ollama for footage/image search queries.

