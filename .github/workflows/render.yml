      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set Vault Inputs
        id: vault_inputs
        run: |
          if [ "${{ inputs.action_type }}" == "RENDER_ONLY" ]; then
             VAULT_NAME="${{ inputs.topic }}"
          else
             VAULT_NAME="${{ needs.creation_job.outputs.vault_name }}"
          fi
          echo "vault_name=$VAULT_NAME" >> $GITHUB_ENV
          
          # Always recalculate total_frames directly from Drive — never trust the Python chain
          # Try public/channels workspace first (RESUME path), then to upload (legacy path)
          TIMELINE_FOUND=false
          
          if rclone copy "data:Colab_AutoVideoCreator/public/channels/${{ inputs.channel_name }}/$VAULT_NAME/master_timeline.json" . --transfers 4 2>/dev/null && [ -s master_timeline.json ]; then
            TIMELINE_FOUND=true
            echo "[+] Timeline found in public/channels workspace."
          elif rclone cat "data:Colab_AutoVideoCreator/channels/${{ inputs.channel_name }}/to upload/$VAULT_NAME/master_timeline.json" > master_timeline.json 2>/dev/null && [ -s master_timeline.json ]; then
            TIMELINE_FOUND=true
            echo "[+] Timeline found in to upload workspace."
          fi
          
          if [ "$TIMELINE_FOUND" == "true" ]; then
            TOTAL=$(jq '((.meta // .metadata // {}).total_duration_ms // 0) | if . > 0 then ((. / 1000) * 30 | round) + 60 else 0 end' master_timeline.json)
            echo "[+] Calculated TOTAL_FRAMES=$TOTAL from master_timeline.json"
          else
            TOTAL=360
            echo "[!] WARNING: master_timeline.json not found on Drive. Defaulting to TOTAL_FRAMES=360."
          fi
          echo "total_frames=$TOTAL" >> $GITHUB_ENV

      - name: Download Asset Chunk from GDrive
        run: |
          mkdir -p public/channels/${{ inputs.channel_name }}/"${{ env.vault_name }}"
          if rclone lsf "data:Colab_AutoVideoCreator/public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}" >/dev/null 2>&1; then
            rclone copy "data:Colab_AutoVideoCreator/public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}" "public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}"
          else
            rclone copy "data:Colab_AutoVideoCreator/channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}" "public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}"
          fi
          rclone copy "data:Colab_AutoVideoCreator/public/audio" "public/audio" --transfers 16
          # Remotion's src/ does: import '../master_timeline.json' — must be at repo root
          cp "public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}/master_timeline.json" master_timeline.json

      - name: Install Dependencies
        run: npm ci

      - name: Calculate Chunk Frames
        id: calc
        run: |
          # Always read directly from the local master_timeline.json (downloaded in previous step)
          # Never trust env vars which may have failed to fetch from Drive
          TOTAL_FRAMES=$(jq '((.meta // .metadata // {}).total_duration_ms // 0) | if . > 0 then ((. / 1000) * 30 | round) + 60 else 0 end' master_timeline.json 2>/dev/null)
          
          if [ -z "$TOTAL_FRAMES" ] || [ "$TOTAL_FRAMES" -le 60 ]; then
            echo "[!] FATAL: Could not read valid total_frames from master_timeline.json (got: '$TOTAL_FRAMES')"
            echo "[!] Dumping master_timeline.json metadata for debug:"
            jq '{meta: .meta, metadata: .metadata}' master_timeline.json 2>/dev/null || echo "master_timeline.json missing or invalid"
            exit 1
          fi
          
          echo "[+] TOTAL_FRAMES=$TOTAL_FRAMES (read from master_timeline.json)"
          
          CHUNK_IDX=${{ matrix.chunk }}
          NUM_CHUNKS=20
          
          FRAMES_PER_CHUNK=$((TOTAL_FRAMES / NUM_CHUNKS))
          START_FRAME=$((CHUNK_IDX * FRAMES_PER_CHUNK))
          
          if [ $CHUNK_IDX -eq $((NUM_CHUNKS - 1)) ]; then
            END_FRAME=$((TOTAL_FRAMES - 1))
          else
            END_FRAME=$((START_FRAME + FRAMES_PER_CHUNK - 1))
          fi
          
          echo "[+] Chunk $CHUNK_IDX: frames $START_FRAME-$END_FRAME (of $TOTAL_FRAMES total)"
          echo "start=$START_FRAME" >> $GITHUB_OUTPUT
          echo "end=$END_FRAME" >> $GITHUB_OUTPUT

      - name: Render Video Chunk
        run: |
          npx remotion render src/index.tsx AutomatedDocumentary chunk_${{ matrix.chunk }}.mp4 --frames=${{ steps.calc.outputs.start }}-${{ steps.calc.outputs.end }} --gl=angle --env CHANNEL_NAME=${{ inputs.channel_name }} --env VAULT_NAME="${{ env.vault_name }}"

      - name: Upload Chunk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk }}
          path: chunk_${{ matrix.chunk }}.mp4
          retention-days: 1

  stitch_and_upload:
    needs: [creation_job, brain_finish_job, render_matrix]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get install rclone jq ffmpeg -y
          python -m pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Configure rclone Silently
        env:
          ENGINE_TOKEN_RAW: ${{ secrets.G_DRIVE_TOKEN }}
          DATA_TOKEN_RAW: ${{ inputs.channel_name == 'Midi-Fi' && secrets.G_DRIVE_TOKEN_MIDIFI || secrets.G_DRIVE_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p ~/.config/rclone
          
          # Engine Token
          E_ACCESS=$(echo $ENGINE_TOKEN_RAW | jq -r '.token')
          E_REFRESH=$(echo $ENGINE_TOKEN_RAW | jq -r '.refresh_token')
          E_EXPIRY=$(echo $ENGINE_TOKEN_RAW | jq -r '.expiry')
          ENGINE_TOKEN="{\"access_token\":\"$E_ACCESS\",\"token_type\":\"Bearer\",\"refresh_token\":\"$E_REFRESH\",\"expiry\":\"$E_EXPIRY\"}"
          
          # Data Token
          D_ACCESS=$(echo $DATA_TOKEN_RAW | jq -r '.token')
          D_REFRESH=$(echo $DATA_TOKEN_RAW | jq -r '.refresh_token')
          D_EXPIRY=$(echo $DATA_TOKEN_RAW | jq -r '.expiry')
          DATA_TOKEN="{\"access_token\":\"$D_ACCESS\",\"token_type\":\"Bearer\",\"refresh_token\":\"$D_REFRESH\",\"expiry\":\"$D_EXPIRY\"}"
          
          cat << EOF > ~/.config/rclone/rclone.conf
          [engine]
          type = drive
          client_id = $CLIENT_ID
          client_secret = $CLIENT_SECRET
          scope = drive
          token = $ENGINE_TOKEN
          
          [data]
          type = drive
          client_id = $CLIENT_ID
          client_secret = $CLIENT_SECRET
          scope = drive
          token = $DATA_TOKEN
          EOF

      - name: Set Vault Inputs
        id: vault_inputs
        run: |
          if [ "${{ inputs.action_type }}" == "RENDER_ONLY" ]; then
             echo "vault_name=${{ inputs.topic }}" >> $GITHUB_ENV
          else
             echo "vault_name=${{ needs.creation_job.outputs.vault_name }}" >> $GITHUB_ENV
          fi

      - name: Download Audio Assets from GDrive
        run: |
          mkdir -p public/channels/${{ inputs.channel_name }}/"${{ env.vault_name }}"
          rclone copy "data:Colab_AutoVideoCreator/public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}" "public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}" --include "master_audio.wav" --include "voiceover.wav" --include "metadata.json" --include "blog_post.json" --include "thumbnail.png"

      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          path: chunks/

      - name: Concatenate and Mix Audio
        run: |
          echo "Downloading 'to upload' metadata folder..."
          mkdir -p "channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}"
          rclone copy "data:Colab_AutoVideoCreator/channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}" "channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}"
          
          echo "" > file_list.txt
          for i in {0..19}; do
            if [ -f "chunks/chunk-$i/chunk_$i.mp4" ]; then
              echo "file 'chunks/chunk-$i/chunk_$i.mp4'" >> file_list.txt
            fi
          done
          
          ffmpeg -f concat -safe 0 -i file_list.txt -c copy final_video_sfx.mp4
          ffmpeg -i final_video_sfx.mp4 -i "public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}/master_audio.wav" -map 0:v:0 -map 1:a:0 -c:v copy -c:a aac -shortest "channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}/final_video.mp4"
          
      - name: Sync Final Video to Google Drive
        run: |
          echo "Saving final video to Google Drive 'to upload' folder..."
          rclone copy "channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}/final_video.mp4" "data:Colab_AutoVideoCreator/channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}" -v
          
      - name: Upload Video to YouTube API
        env:
          AUTO_TARGET_FOLDER: "channels/${{ inputs.channel_name }}/to upload/${{ env.vault_name }}"
        run: |
          echo "Downloading private uploader script and tokens from Google Drive..."
          rclone copy "engine:Colab_AutoVideoCreator/youtube_uploader.py" "." -v
          mkdir -p tokens
          rclone copy "engine:Colab_AutoVideoCreator/tokens" "tokens" -v
          
          echo "Installing Google API requirements..."
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
          
          echo "Running YouTube Uploader..."
          python youtube_uploader.py
          
      - name: Clean Up Public Assets Folder
        run: |
          echo "Purging raw rendering assets from Google Drive to save space..."
          rclone purge "data:Colab_AutoVideoCreator/public/channels/${{ inputs.channel_name }}/${{ env.vault_name }}" || true
          
          # Clean up ollama pool directory
          rclone purge "data:Colab_AutoVideoCreator/ollama_pool_${{ github.run_id }}" || true

